components:
  schemas:
    AllDrivers:
      type: object
      properties:
        driver_name:
          type: string
          nullable: true
          maxLength: 128
    AnalysisParameterProduct:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        parameter_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_deleted:
          type: boolean
        deleted_at:
          type: string
          format: date-time
          nullable: true
        normal_min:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,6})?$
          nullable: true
        normal_max:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,6})?$
          nullable: true
        rejected_min:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,6})?$
          nullable: true
        rejected_max:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,6})?$
          nullable: true
        notes:
          type: string
          nullable: true
        metadata: {}
        deleted_by:
          type: integer
